# ============================================================
# EXP-A: Capacity Ceiling
# ============================================================
expA:
  n_decisions: 1000
  n_seeds: 10
  checkpoints: [50, 100, 200, 400, 700, 1000]
  oracle:
    type: "gt_aligned"
    noise_rate: 0.0
  w_init: "uniform"   # MUST stay uniform — tests whether G eliminates warm-start need
  # Scoring override: ratio=1 (symmetric) so cold-start is viable.
  # Break-even at 50% (ratio/(1+ratio)=0.5), reachable from the random-policy 25% baseline.
  # bridge_common uses ratio=2 (break-even=67%), which keeps the model below break-even
  # for all 1000 steps — making VA.1 fail without this override.
  scoring:
    alpha_correct: 0.06
    alpha_incorrect: 0.06
    temperature: 0.25
    weight_clamp: 5.0
    decay_rate: 0.001
  gating:
    hebbian:
      learning_rate: 0.005
      damping: true
      initial_g: 1.0    # G starts at neutral (1.0); max_gate=2.0 allows amplification
      max_gate: 2.0     # allow G to amplify above 1.0 for informative factors
    mi:
      threshold: 0.1
      fit_decisions: 200
  # Validation gate thresholds
  # VA.1: simplified (truly orthogonal) w_only > 80%
  # VA.3: realistic w_only < 55%  (capacity ceiling)
  # VA.6: capacity_gap = simplified_w_only - realistic_w_only >= 25pp
  #       (demonstrates ceiling significance; G configs reported for context)
  gates:
    va1_threshold: 0.80
    va3_threshold: 0.55
    va6_gap_threshold: 0.25
